# STUB — not yet wired to real project
name: Build (Stub)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tuist-starter
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tuist-starter/go.mod
      - name: Setup
        run: make setup
      - name: Build
        run: make build
