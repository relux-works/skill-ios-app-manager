# STUB — not yet wired to real project
name: Lint (Stub)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: tuist-starter

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tuist-starter/go.mod
          cache-dependency-path: tuist-starter/go.sum
      - name: Lint
        run: make lint
